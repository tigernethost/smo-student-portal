name: smo-student-portal
region: sgp
services:
- name: backend
  github:
    repo: tigernethost/smo-student-portal
    branch: main
    deploy_on_push: true
  source_dir: backend
  environment_slug: php
  build_command: mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions
    storage/logs bootstrap/cache && rm -f bootstrap/cache/routes-*.php && composer
    install --no-dev --optimize-autoloader --ignore-platform-req=ext-intl && php artisan
    config:cache && php artisan view:cache
  run_command: heroku-php-apache2 public/
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  routes:
  - path: /api
  envs:
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: 'false'
  - &id001
    key: APP_KEY
    value: ''
    type: SECRET
    scope: RUN_AND_BUILD
  - key: LOG_CHANNEL
    value: stderr
  - key: DB_CONNECTION
    value: pgsql
  - key: DB_HOST
    value: ${portal-db.HOSTNAME}
  - key: DB_PORT
    value: ${portal-db.PORT}
  - key: DB_DATABASE
    value: ${portal-db.DATABASE}
  - key: DB_USERNAME
    value: ${portal-db.USERNAME}
  - key: DB_PASSWORD
    value: ${portal-db.PASSWORD}
    type: SECRET
  - key: DB_SSLMODE
    value: require
- name: frontend
  github:
    repo: tigernethost/smo-student-portal
    branch: main
    deploy_on_push: true
  source_dir: frontend
  environment_slug: node-js
  build_command: npm ci && npm run build
  run_command: npm start
  http_port: 3000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  routes:
  - path: /
  envs:
  - key: NODE_ENV
    value: production
  - key: NEXT_TELEMETRY_DISABLED
    value: '1'
  - key: NEXT_PUBLIC_API_URL
    value: ${APP_URL}
- name: queue-worker
  github:
    repo: tigernethost/smo-student-portal
    branch: main
    deploy_on_push: true
  source_dir: backend
  environment_slug: php
  build_command: mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions
    storage/logs bootstrap/cache && rm -f bootstrap/cache/*.php && composer install
    --no-dev --optimize-autoloader --ignore-platform-req=ext-intl
  run_command: |
    # Force correct drivers before any artisan command runs
    sed -i '/^CACHE_DRIVER/d' .env || true
    sed -i '/^SESSION_DRIVER/d' .env || true
    sed -i '/^QUEUE_CONNECTION/d' .env || true
    sed -i '/^DB_CONNECTION/d' .env || true
    echo "DB_CONNECTION=pgsql" >> .env
    echo "CACHE_DRIVER=array" >> .env
    echo "SESSION_DRIVER=array" >> .env
    echo "QUEUE_CONNECTION=database" >> .env
    rm -f bootstrap/cache/config.php bootstrap/cache/*.php
    php artisan config:clear
    php artisan queue:work --sleep=3 --tries=3 --max-time=3600
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  envs:
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: 'false'
  - key: LOG_CHANNEL
    value: stderr
  - key: DB_CONNECTION
    value: pgsql
  - key: DB_HOST
    value: ${portal-db.HOSTNAME}
  - key: DB_PORT
    value: ${portal-db.PORT}
  - key: DB_DATABASE
    value: ${portal-db.DATABASE}
  - key: DB_USERNAME
    value: ${portal-db.USERNAME}
  - key: DB_PASSWORD
    value: ${portal-db.PASSWORD}
  - key: DB_SSLMODE
    value: require
  - key: QUEUE_CONNECTION
    value: database
  - key: CACHE_DRIVER
    value: array
  - key: SESSION_DRIVER
    value: array
  - key: DATABASE_URL
    value: ${portal-db.DATABASE_URL}
  - *id001
jobs:
- name: db-migrate
  kind: PRE_DEPLOY
  github:
    repo: tigernethost/smo-student-portal
    branch: main
    deploy_on_push: true
  source_dir: backend
  environment_slug: php
  build_command: mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions
    storage/logs bootstrap/cache && composer install --no-dev --optimize-autoloader
    --ignore-platform-req=ext-intl
  run_command: php artisan migrate --force
  envs:
  - key: DATABASE_URL
    value: ${portal-db.DATABASE_URL}
    scope: RUN_TIME
  - key: DB_CONNECTION
    value: pgsql
    scope: RUN_TIME
databases:
- name: portal-db
  engine: PG
  version: '16'
  size: db-s-dev-database
  num_nodes: 1
  production: false
domains:
- domain: portal.schoolmate-online.net
  type: PRIMARY
